        function initFormData() {
            return {
                driverName: state.shouldFixUser ? state.fixedName : '',
                driverDni: state.shouldFixUser ? state.fixedDni : '',

                weekDate: new Date().toISOString().split('T')[0],

                    thursday: { oil: 'BUENO', water: 'BUENO', notes: '' },
                    friday: { oil: 'BUENO', water: 'BUENO', notes: '' },
                },
                checks: {}, 
                urgency: null,
                observations: '',
                isCleanWeek: false
            };

        function loadHistory() {
            try {
                const stored = localStorage.getItem('vehicle_history');
                if (stored) {
                    state.history = JSON.parse(stored);
                    if (!Array.isArray(state.history)) state.history = [];
                }
            } catch (e) {
                console.error("Error loading history", e);
                state.history = [];
            }
        }

        function calculateMonthlyCredits(dni) {
            if (!dni) return 0;
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            
            return state.history.reduce((total, record) => {
                const recDate = new Date(record.timestamp);
                if (record.driverDni === dni && 
                    recDate.getMonth() === currentMonth && 
                    recDate.getFullYear() === currentYear) {
                    return total + (record.creditsAwarded || 0);
                }
                return total;
            }, 0);
        }

        function calculatePoints(checks, dailyChecks, isCleanWeek) {
            let pts = 0;
            let messages = [];

            // 1. Semana sin Fallas (Declaración Proactiva)
            if (isCleanWeek) {
                pts += 5;
                messages.push("BONO SEMANA SIN FALLAS (+5)");
            }

            // 2. Aceite / Agua MALO
            const hasMaloAW = KEYS.some(k => 
                dailyChecks[k] && (dailyChecks[k].oil === 'MALO' || dailyChecks[k].water === 'MALO')
            );
            if (hasMaloAW) {
                pts += 5;
                messages.push("EVITASTE FALLA TÉCNICA (+5)");
            }

            // Otros items
            const docIds = ['g1', 'g2', 's2', 'g45'];
            let hasDocPoints = false;
            let hasAccidentPoints = false;
            
            Object.entries(checks).forEach(([id, status]) => {
                const isDoc = docIds.includes(id);
                if (isDoc) {
                    if (status === 'PROGRAMAR. URGENCIA MEDIA') {
                        pts += 5;
                        hasDocPoints = true;
                    } else if (status === 'CRÍTICO. URGENCIA ALTA') {
                        pts += 1;
                        hasDocPoints = true;
                    }
                } else {
                    if (status === 'PROGRAMAR. URGENCIA MEDIA') {
                        pts += 10;
                        hasAccidentPoints = true;
                    } else if (status === 'CRÍTICO. URGENCIA ALTA') {
                        pts += 5;
                        hasAccidentPoints = true;
                    }
                }
            });

            if (hasDocPoints) messages.push("EVITASTE SANCIÓN DOCUMENTAL");
            if (hasAccidentPoints) messages.push("EVITASTE ACCIDENTE VIAL");

            return { pts, messages };
        }

        function deleteRecord(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este registro? Esta acción no se puede deshacer.')) return;
            
            state.history = state.history.filter(h => h.id !== id);
            localStorage.setItem('vehicle_history', JSON.stringify(state.history));
            
            // Re-render
            if (state.showHistoryModal) {
                // Eliminar el overlay actual y volver a abrir para refrescar
                const overlay = document.querySelector('.history-modal-overlay');
                if (overlay) overlay.remove();
                renderHistoryModal();
            }
            render(); // Refrescar el resto de la app
        }

        function selectVehicle(id, targetDate = null) {
            state.selectedVehicle = vehicles.find(v => v.id === id);
            state.view = 'form';
            
            // Cargar datos por defecto
            state.formData = initFormData();
            if (targetDate) state.formData.weekDate = targetDate;
            
            // Cargar kilometraje recordado
            const mileages = JSON.parse(localStorage.getItem('vehicle_mileages') || '{}');
            if (mileages[id]) {
                state.formData.startMileage = mileages[id];
            }

            // Buscar registro existente para esta semana
            const weekToSearch = targetDate || state.formData.weekDate;
            const saved = state.history
                .filter(r => r.vehicleId === id && r.weekDate === weekToSearch)
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
            
            if (saved) {
                state.formData = {
                    driverName: saved.driverName || (state.shouldFixUser ? state.fixedName : ''),
                    driverDni: saved.driverDni || (state.shouldFixUser ? state.fixedDni : ''),
                    startMileage: saved.startMileage || state.formData.startMileage,
                    weekDate: saved.weekDate,
                    dailyChecks: saved.dailyChecks || initFormData().dailyChecks,
                    checks: saved.checkStatus || {},
                    urgency: saved.urgency || null,
                    observations: saved.generalObservations || '',
                    isCleanWeek: saved.isCleanWeek || false
                };
            }
            
            render();
        }

        function goBack() {
            state.selectedVehicle = null;
            state.view = 'list';
            render();
        }

        function updateForm(field, value, day = null, subField = null) {
            if (day) {
                state.formData.dailyChecks[day][subField] = value;
                if (value === 'MALO') state.formData.isCleanWeek = false;
            } else {
                state.formData[field] = value;
            }

            if (field === 'driverName' && state.shouldFixUser) {
                localStorage.setItem('fixed_name', value);
                state.fixedName = value;
            }
            if (field === 'driverDni' && state.shouldFixUser) {
                localStorage.setItem('fixed_dni', value);
                state.fixedDni = value;
            }

            if (field === 'startMileage' && state.selectedVehicle) {
                const mileages = JSON.parse(localStorage.getItem('vehicle_mileages') || '{}');
                mileages[state.selectedVehicle.id] = value;
                localStorage.setItem('vehicle_mileages', JSON.stringify(mileages));
            }
            
            if (field === 'weekDate') {
                const saved = state.history
                .filter(r => r.vehicleId === state.selectedVehicle.id && r.weekDate === value)
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
            
                if (saved) {
                    state.formData = {
                        ...state.formData,
                        driverName: saved.driverName,
                        startMileage: saved.startMileage,
                        dailyChecks: saved.dailyChecks,
                        checks: saved.checkStatus,
                        urgency: saved.urgency,
                        observations: saved.generalObservations
                    };
                } else {
                    const currentName = state.formData.driverName;
                    const currentDni = state.formData.driverDni;
                    const currentKm = state.formData.startMileage;
                    state.formData = initFormData();
                    state.formData.weekDate = value;
                    state.formData.driverName = currentName;
                    state.formData.driverDni = currentDni;
                    state.formData.startMileage = currentKm;
                }
            }
            render();
        }

        function toggleFixUser() {
            state.shouldFixUser = !state.shouldFixUser;
            localStorage.setItem('should_fix_user', state.shouldFixUser);
            if (state.shouldFixUser) {
                localStorage.setItem('fixed_name', state.formData.driverName);
                localStorage.setItem('fixed_dni', state.formData.driverDni);
                state.fixedName = state.formData.driverName;
                state.fixedDni = state.formData.driverDni;
            }
            render();

        function toggleLayout() {
            state.layoutMode = state.layoutMode === 'pc' ? 'mobile' : 'pc';
            render();

        function cycleCheck(itemId) {
            const current = state.formData.checks[itemId];
            if (!current) {
                state.formData.checks[itemId] = 'PROGRAMAR. URGENCIA MEDIA';
                state.formData.isCleanWeek = false; // Cualquier falla anula semana limpia
            } else if (current === 'PROGRAMAR. URGENCIA MEDIA') {
                state.formData.checks[itemId] = 'CRÍTICO. URGENCIA ALTA';
                state.formData.isCleanWeek = false;
            } else {
                delete state.formData.checks[itemId];
            }
            render();
        }

        // --- HELPER: AUTO-FIT EXCEL COLUMNS ---
        function applyAutoWidths(ws, data) {
            if (!data || data.length === 0) return;
            const colWidths = data[0].map((_, i) => {
                const maxLen = data.reduce((max, row) => {
                    const cellValue = row[i] ? String(row[i]) : "";
                    return Math.max(max, cellValue.length);
                }, 10);
                return { wch: maxLen + 2 };
            });
            ws['!cols'] = colWidths;
        }

        function clearChecks() {
            state.formData.checks = {};
            render();
        }

        function resetDailyChecks() {
            KEYS.forEach(k => {
                state.formData.dailyChecks[k].oil = 'BUENO';
                state.formData.dailyChecks[k].water = 'BUENO';
            });
        }

        function getStats() {
            let bad = 0, good = 0;
            const total = KEYS.length * 2;
            KEYS.forEach(k => {
                const d = state.formData.dailyChecks[k];
                if(d.oil === 'MALO') bad++;
                if(d.oil === 'BUENO') good++;
                if(d.water === 'MALO') bad++;
                if(d.water === 'BUENO') good++;
            });
            return { bad, good, total };
        }

        function saveRecord(type) {
            const vehicle = state.selectedVehicle;
            
            // Siempre se calculan créditos (proactivo)
            const result = calculatePoints(state.formData.checks, state.formData.dailyChecks, state.formData.isCleanWeek);

            const record = {
                id: Date.now().toString(),
                timestamp: new Date().toISOString(),
                vehicleId: vehicle.id,
                driverName: state.formData.driverName,
                driverDni: state.formData.driverDni,
                startMileage: state.formData.startMileage,
                weekDate: state.formData.weekDate,
                type: type,
                creditsAwarded: result.pts,
                creditReasons: result.messages,
                isCleanWeek: state.formData.isCleanWeek,
                dailyChecks: JSON.parse(JSON.stringify(state.formData.dailyChecks)),
                checkStatus: JSON.parse(JSON.stringify(state.formData.checks)),
                generalObservations: state.formData.observations,
                reportedItems: [...genericItems, ...specificItems]
                    .filter(i => state.formData.checks[i.id])
                    .map(i => ({ label: i.label, sub: i.sub, status: state.formData.checks[i.id], id: i.id }))
            };

            // Evitar duplicados en la misma semana/vehículo: si ya existe, reemplazar.
            const existingIdx = state.history.findIndex(h => h.vehicleId === vehicle.id && h.weekDate === state.formData.weekDate);
            if (existingIdx !== -1) {
                state.history[existingIdx] = record;
            } else {
                state.history.unshift(record);
            }

            localStorage.setItem('vehicle_history', JSON.stringify(state.history));
            if (type === 'Parcial') {
                // Notificación silenciosa o simple
                const saveBtn = document.querySelector('button[onclick*="saveRecord(\'Parcial\')"]');
                if (saveBtn) {
                    const originalText = saveBtn.innerHTML;
                    saveBtn.innerHTML = '✅ GUARDADO';
                    setTimeout(() => saveBtn.innerHTML = originalText, 2000);
                }
            }
            render();
        }

        function exportExcel(emailTrigger) {
            if (validate().length > 0) return alert(validate().join('\n'));
            saveRecord('Reporte Semanal');

            const wb = XLSX.utils.book_new();
            const data = [
                ["REPORTE SEMANAL"], ["VEHÍCULO", state.selectedVehicle.description],
                ["PATENTE", state.selectedVehicle.domain], ["CHOFER", state.formData.driverName],
                ["DNI", state.formData.driverDni],
                ["KM", state.formData.startMileage], ["FECHA", state.formData.weekDate], [""]
            ];
            
            data.push(["DIA", "ACEITE", "AGUA", "NOTAS"]);
            KEYS.forEach((k, i) => {
                const d = state.formData.dailyChecks[k];
                data.push([DAYS[i], d.oil, d.water, d.notes]);
            });
            data.push([""]);

            // Detalle por Categoría
            data.push(["CATEGORÍA / GRUPO", "ESTADO / HALLAZGOS"]);
            
            const allItems = [...genericItems, ...specificItems];
            const groups = [...new Set(allItems.map(i => i.sub))];
            
            groups.forEach(groupName => {
                const groupItems = allItems.filter(i => i.sub === groupName);
                const reportedInGroup = groupItems.filter(i => state.formData.checks[i.id]);
                
                if (reportedInGroup.length > 0) {
                    const detail = reportedInGroup.map(i => {
                        const status = state.formData.checks[i.id];
                        const label = status === 'CRÍTICO. URGENCIA ALTA' ? '[ALTA]' : '[MED]';
                        return `${i.label} ${label}`;
                    }).join(' | ');
                    data.push([groupName, detail]);
                } else {
                    data.push([groupName, "OK"]);
                }
            });

            if (state.formData.observations) {
                data.push([""]);
                data.push(["OBSERVACIONES", state.formData.observations]);
            }

            const ws = XLSX.utils.aoa_to_sheet(data);
            applyAutoWidths(ws, data);
            XLSX.utils.book_append_sheet(wb, ws, "Reporte");
            const fname = `Reporte_${state.selectedVehicle.id}_${state.formData.weekDate}.xlsx`;
            XLSX.writeFile(wb, fname);

            if (emailTrigger) {
                const body = `Adjunto reporte para ${state.selectedVehicle.domain}. Obs: ${state.formData.observations || '-'}`;
                window.location.href = `mailto:administracion@azilutsa.com.ar?subject=Reporte ${state.selectedVehicle.id}&body=${encodeURIComponent(body)}`;
            }
        }

        function exportMonthlyReport() {
            const dni = state.formData.driverDni || state.fixedDni;
            if (!dni) return alert("Debe ingresar su DNI para generar el reporte mensual.");

            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            
            const monthRecords = state.history.filter(r => {
                const d = new Date(r.timestamp);
                return r.driverDni === dni && d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            if (monthRecords.length === 0) return alert("No hay registros para este mes.");

            const wb = XLSX.utils.book_new();
            
            // 1. Hoja de Resumen y Créditos
            const credits = calculateMonthlyCredits(dni);
            const summaryData = [
                ["INFORME MENSUAL CONSOLIDADO DE ACTIVIDAD"],
                ["CONDUCTOR", state.formData.driverName || state.fixedName],
                ["DNI", dni],
                ["PERIODO", `${currentMonth + 1}/${currentYear}`],
                ["FECHA GENERACIÓN", new Date().toLocaleDateString()],
                [""],
                ["RESUMEN DE DESEMPEÑO"],
                ["PUNTAJE / CRÉDITOS ACUMULADOS", credits, "🏆"],
                ["TOTAL DE REPORTES EN EL MES", monthRecords.length],
                [""],
                ["DETALLE DE ACTIVIDAD (REPORTE SEMANAL Y PARCIALES):"]
            ];

            const detailHeader = ["FECHA", "VEHÍCULO", "TIPO", "KM", "LUN (A/W)", "MAR (A/W)", "MIE (A/W)", "JUE (A/W)", "VIE (A/W)", "OBSERVACIONES"];
            const detailRows = monthRecords.map(r => {
                const d = r.dailyChecks || {};
                const fmtDay = (day) => {
                    if (!d[day]) return "-";
                    const oil = d[day].oil === 'BUENO' ? 'B' : (d[day].oil === 'MALO' ? 'M' : '-');
                    const water = d[day].water === 'BUENO' ? 'B' : (d[day].water === 'MALO' ? 'M' : '-');
                    return `${oil}/${water}`;
                };

                return [
                    new Date(r.timestamp).toLocaleDateString(),
                    r.vehicleId,
                    r.type,
                    r.startMileage,
                    fmtDay('monday'),
                    fmtDay('tuesday'),
                    fmtDay('wednesday'),
                    fmtDay('thursday'),
                    fmtDay('friday'),
                    r.generalObservations || ""
                ];
            });

            const ws = XLSX.utils.aoa_to_sheet([...summaryData, detailHeader, ...detailRows]);

            // Auto-fit para el mensual (un poco más generoso)
            const allRows = [...summaryData, detailHeader, ...detailRows];
            applyAutoWidths(ws, allRows);

            XLSX.utils.book_append_sheet(wb, ws, "Consolidado Mensual");
            
            const fname = `Informe_Mensual_${dni}_${currentYear}_${currentMonth+1}.xlsx`;
            XLSX.writeFile(wb, fname);
            alert("Informe mensual generado y descargado. Contiene el detalle de controles diarios y créditos acumulados.");
        }

        async function generateTicketPDF(record, customTitle = "PEDIDO DE MANTENIMIENTO") {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                unit: 'mm',
                format: [80, 200] // Ticket format
            });

            const margin = 5;
            let y = 10;

            // Header
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("AZILUT S.A.", 40, y, { align: 'center' });
            y += 6;
            doc.setFontSize(8);
            doc.text(customTitle, 40, y, { align: 'center' });
            y += 8;

            // Vehicle Info
            const v = vehicles.find(veh => veh.id === record.vehicleId) || { description: '?', domain: '?' };
            doc.setFontSize(7);
            doc.setFont("helvetica", "bold");
            doc.text(`VEHÍCULO: ${v.description} (${record.vehicleId})`, margin, y);
            y += 4;
            doc.text(`PATENTE: ${v.domain}`, margin, y);
            y += 4;
            doc.text(`CONDUCTOR: ${record.driverName}`, margin, y);
            y += 4;
            doc.text(`DNI: ${record.driverDni}`, margin, y);
            y += 4;
            doc.text(`KM: ${record.startMileage} | FECHA: ${record.weekDate}`, margin, y);
            y += 6;

            doc.setLineWidth(0.2);
            doc.line(margin, y, 75, y);
            y += 5;

            // Items
            const items = record.reportedItems || [];
            if (items.length > 0) {
                doc.setFontSize(8);
                doc.text("DETALLE DE FALLAS:", margin, y);
                y += 5;
                
                items.forEach(i => {
                    const status = i.status;
                    const isCritical = status === 'CRÍTICO. URGENCIA ALTA';
                    
                    if (isCritical) {
                        doc.setFillColor(200, 0, 0);
                        doc.rect(margin, y - 2.5, 2, 2, 'F');
                    } else {
                        doc.setFillColor(0, 0, 200);
                        doc.rect(margin, y - 2.5, 2, 2, 'F');
                    }

                    doc.setFontSize(7);
                    doc.setFont("helvetica", "normal");
                    doc.text(`${i.label}`, margin + 4, y);
                    
                    doc.setFontSize(5);
                    doc.text(isCritical ? "URGENCIA ALTA" : "URGENCIA MEDIA", 65, y, { align: 'right' });
                    
                    y += 4;
                    if (y > 185) { doc.addPage(); y = 10; }
                });
            } else if (!record.generalObservations) {
                doc.text("No se marcaron ítems.", margin, y);
                y += 5;
            }

            // Observations
            if (record.generalObservations) {
                y += 2;
                doc.setFontSize(8);
                doc.setFont("helvetica", "bold");
                doc.text("OBSERVACIONES:", margin, y);
                y += 4;
                doc.setFont("helvetica", "normal");
                doc.setFontSize(7);
                const splitObs = doc.splitTextToSize(record.generalObservations, 70);
                doc.text(splitObs, margin, y);
                y += splitObs.length * 4;
            }

            // Credits Reasons
            if ((record.creditReasons || []).length > 0) {
                doc.setFontSize(6);
                doc.setFont("helvetica", "bolditalic");
                doc.setTextColor(100);
                doc.text(record.creditReasons.join(" | "), margin, y);
                y += 4;
                doc.setTextColor(0);
            }

            y += 5;
            doc.setLineWidth(0.1);
            doc.line(margin, y, 75, y);
            y += 5;
            doc.setFontSize(6);
            doc.text("Documento generado automáticamente", 40, y, { align: 'center' });

            const pdfData = doc.output('bloburl');
            window.open(pdfData, '_blank');
            doc.save(`Ticket_${record.vehicleId}_${record.weekDate}.pdf`);
        }

        function restoreData(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(Array.isArray(data)) {
                        state.history = data;
                        localStorage.setItem('vehicle_history', JSON.stringify(data));
                        alert('Restaurado ' + data.length + ' registros.');
                        render();
                    }
                } catch(err) { alert('Error archivo invalido'); }
            };
            reader.readAsText(input.files[0]);
        }

        function selectReportPeriod(p) {
            state.selectedReportPeriod = p;

        }

        function toggleRangeInputs() {
            state.selectedReportPeriod = state.selectedReportPeriod === 'range' ? 'day' : 'range';
            render();
        }

        function processReport(btn) {
            const rangeFrom = document.getElementById('report-from')?.value;
            const rangeTo = document.getElementById('report-to')?.value;
            
            // Lógica de créditos al emitir reporte
            saveRecord('Reporte Semanal'); 
            
            if (state.selectedReportPeriod === 'month') {
                exportMonthlyReport();
            } else if (state.selectedReportPeriod === 'range') {
                if (!rangeFrom || !rangeTo) {
                    alert("Por favor selecciona un rango de fechas válido.");
                    return;
                }
                alert(`Generando reporte desde ${rangeFrom} hasta ${rangeTo}...`);
                exportExcel(false);
            } else {
                exportExcel(false);
            }
            
            closeReportSelector(btn);
        }

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            if (state.view === 'list') {
                app.innerHTML = renderHeader() + renderVehicleList() + renderFooter();
            } else {
                app.innerHTML = renderForm();
            }
            
            if (state.showHistoryModal) renderHistoryModal();
            if (state.showReportSelector) renderReportSelector();
        }

        function loadHistoryRecord(id) {
            const record = state.history.find(h => h.id === id);
            if (!record) return;
            
            selectVehicle(record.vehicleId, record.weekDate);
            state.formData = {
                ...state.formData,
                driverName: record.driverName,
                driverDni: record.driverDni,
                startMileage: record.startMileage,
                dailyChecks: record.dailyChecks,
                checks: record.checkStatus,
                observations: record.generalObservations,
                isCleanWeek: record.isCleanWeek || false
            };
            
            // Cerrar modal
            const overlay = document.querySelector('.history-modal-overlay');
            if (overlay) overlay.remove();
            state.showHistoryModal = false;
            render();
        }

        function printHistoryRecord(id) {
            const record = state.history.find(h => h.id === id);
            if (!record) return;
            generateTicketPDF(record);
        }

        function closeModal(btn) {
            btn.closest('.fixed').remove();
            state.showHistoryModal = false;
        }

        function closeReportSelector(btn) {
            const overlay = btn.closest('#report-selector-overlay') || btn;
            if (overlay && overlay.remove) overlay.remove();
            state.showReportSelector = false;
        }

        // Run
